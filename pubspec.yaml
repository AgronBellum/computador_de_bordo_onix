name: combustivel
description: App de multimidia para carro - calculo de autonomia com GPS offline

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  geolocator: ^10.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  audioplayers: ^6.1.0
  speech_to_text: ^7.0.0
  video_player: ^2.9.2
  cupertino_icons: ^1.0.6
  vosk_flutter:
    path: third_party/vosk_flutter
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
    - assets/videos/
    - assets/vosk/
    - assets/maps/pelotas_roads.json
    - assets/maps/rs_sul_region.json


